<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskify — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ── SIDEBAR ──────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Taskify</span>
    </div>
    <nav class="filters">
      <p class="nav-label">FILTER</p>
      <button class="filter-btn active" data-status="">All Tasks</button>
      <button class="filter-btn" data-status="Pending">Pending</button>
      <button class="filter-btn" data-status="In Progress">In Progress</button>
      <button class="filter-btn" data-status="Completed">Completed</button>
    </nav>
    <div class="sidebar-stats">
      <p class="nav-label">OVERVIEW</p>
      <div class="stat"><span id="stat-total">0</span><small>Total</small></div>
      <div class="stat"><span id="stat-pending">0</span><small>Pending</small></div>
      <div class="stat"><span id="stat-progress">0</span><small>In Progress</small></div>
      <div class="stat"><span id="stat-done">0</span><small>Done</small></div>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ─────────────────────────────────────────── -->
  <main class="main">

    <header class="top-bar">
      <div>
        <h1 class="page-title">My Tasks</h1>
        <p class="page-sub" id="task-count">Loading tasks...</p>
      </div>
      <button class="btn-add" id="btn-open-modal">+ New Task</button>
    </header>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Task Grid -->
    <section class="task-grid" id="task-grid">
      <div class="empty-state" id="empty-state" style="display:none;">
        <span>🗂️</span>
        <p>No tasks yet. Create one!</p>
      </div>
    </section>
  </main>

  <!-- ── MODAL ────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="btn-close-modal">✕</button>
      </div>

      <form id="task-form" novalidate>
        <input type="hidden" id="task-id"/>

        <div class="form-group">
          <label for="title">Task Title <span class="required">*</span></label>
          <input type="text" id="title" placeholder="e.g. Complete the project report" maxlength="150"/>
          <span class="field-error" id="err-title"></span>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3" placeholder="What needs to be done?"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="priority">Priority <span class="required">*</span></label>
            <select id="priority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Status <span class="required">*</span></label>
            <select id="status">
              <option value="Pending" selected>Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="due_date">Due Date</label>
          <input type="date" id="due_date"/>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-save" id="btn-save">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── DELETE CONFIRM ───────────────────────────────────────── -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal confirm-modal">
      <div class="confirm-icon">🗑️</div>
      <h3>Delete Task?</h3>
      <p>This action cannot be undone.</p>
      <div class="form-actions">
        <button class="btn-cancel" id="btn-confirm-cancel">Cancel</button>
        <button class="btn-delete-confirm" id="btn-confirm-delete">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
